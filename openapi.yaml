openapi: 3.0.3

info:
  title: h26_07 API
  version: 0.1.0

servers:
  - url: http://localhost:8080
    description: 開発環境

paths:
  /api/me:
    get:
      summary: 自分のユーザー情報を取得
      operationId: getMe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "500":
          description: Internal Server Error

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
